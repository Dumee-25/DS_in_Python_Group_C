name: ci
on: [push, pull_request]
jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install -r requirements.txt ruff pytest
      - run: ruff check .
      - run: pytest tests/ -q
      # Smoke: 3 questions vs the stub orchestrator, keyword matching only —
      # no LLM judge, no API keys/secrets needed in CI.
      - run: python -m evaluation.runner --smoke
